model:
  name: mistralai/Voxtral-Mini-4B-Realtime-2602
adapter: voxtral_chat
# Voxtral needs transformers >=5.13 + mistral-common. That env is incompatible
# with qwen-asr (which pins transformers <5.0), so Voxtral has its own venv.
# benchy will fail fast if you launch it from the wrong .venv*/bin/benchy.
venv: .venv-vox
voxtral_chat:
  trust_remote_code: true
  # 4B params: fp32 = ~16 GB RAM, fp16 = ~8 GB. fp16 is mandatory on <=16 GB Macs.
  torch_dtype: float16
  max_new_tokens: 256
  # Apple Silicon: device='auto' resolves to mps, which wedges on
  # Voxtral-4B inference (same uninterruptible-syscall pattern as
  # whisper-large-v3). Force CPU for predictable behavior on Mac;
  # set to cuda or auto on Linux+GPU.
  device: cpu
task_defaults:
  log_samples: true
tasks:
- transcription
metadata:
  provider: huggingface
  model_type: voxtral
  is_cloud: false
  description: "mistralai/Voxtral-Mini-4B-Realtime-2602 via voxtral_chat adapter (~4B params; en/fr/es/de/ru/zh/ja/it). fp16 required on <=16GB Macs."
