benchmark:
  name: email-request
  description: benchmark for extracion of relevant information from emails from customers
    asking for ambulance transport request
  task:
    type: extraction
    input:
      type: text
      description: reads emails and extracts the relevant information in a structured
        format
    output:
      type: structured
      fields:
      - name: sender_full-name
        type: string
        required: true
      - name: recipient
        type: string
        required: true
      - name: number of ambulance transports needed
        type: string
        required: true
      - name: date when transports need to be delivered
        type: string
        required: true
      - name: medical-unit
        type: string
        required: true
  scoring:
    type: per_field
    partial_credit: true
    numeric_tolerance: 0.0
    case_sensitive: false
  data:
    source: local
    count: 10
    seed_description: emails from clients requesting ambulance transport with the
      data detailed in the extraction schema field names
    path: .data/email-request/train.jsonl
  target:
    type: model
    provider: together
    model: google/gemma-4-31B-it
    system_prompt: You are an expert information extractor for a medical transport
      company
